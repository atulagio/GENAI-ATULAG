name: CD

# Runs after CI succeeds on main.
# 1. Builds and pushes the image to GitHub Container Registry (GHCR).
# 2. Rolls the new image out to an AWS EKS cluster.
#
# Repo is a monorepo — this project lives in LEAVE-MANAGEMENT-PG-MCP/, not
# at the repo root — so every `run:` step executes inside that folder via
# `defaults.run.working-directory`, and steps that don't respect that
# (docker/build-push-action) get an explicit path instead.
#
# Database is Neon (managed Postgres) — there's no in-cluster Postgres to
# stand up, so this workflow only applies the app-facing manifests, not
# k8s/postgres.yaml.
on:
  push:
    branches: ["master"]
    paths: ["LEAVE-MANAGEMENT-PG-MCP/**"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # e.g. ghcr.io/your-org/your-monorepo
  PROJECT_DIR: LEAVE-MANAGEMENT-PG-MCP

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ github.workspace }}/${{ env.PROJECT_DIR }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    defaults:
      run:
        working-directory: ${{ github.workspace }}/LEAVE-MANAGEMENT-PG-MCP
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}          
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Point kubectl at the EKS cluster
        run: |
          aws eks update-kubeconfig \
            --name "${{ secrets.EKS_CLUSTER_NAME }}" \
            --region "${{ secrets.AWS_REGION }}"

      - name: Create/update leave-mcp-secrets from GitHub secrets
        # DATABASE_URL should be your Neon connection string, e.g.
        # postgresql://user:password@ep-xxxx.region.aws.neon.tech/leave_management?sslmode=require
        run: |
          kubectl create secret generic leave-mcp-secrets \
            --namespace leave-management \
            --from-literal=DATABASE_URL='${{ secrets.DATABASE_URL }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply manifests (app only — Neon replaces in-cluster postgres.yaml)
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Set image and roll out
        run: |
          kubectl set image deployment/leave-mcp-server \
            leave-mcp-server=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n leave-management
          kubectl rollout status deployment/leave-mcp-server -n leave-management --timeout=180s
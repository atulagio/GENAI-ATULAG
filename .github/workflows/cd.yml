name: CD

# Runs after CI succeeds on main, or when you push a version tag (v1.2.3).
# 1. Builds and pushes the image to GitHub Container Registry (GHCR).
# 2. Rolls the new image out to Kubernetes (only if KUBE_CONFIG secret is set).
on:
  push:
    branches: ["master"]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # e.g. ghcr.io/your-org/leave-management-mcp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    # Only attempt a cluster rollout if KUBE_CONFIG has been added as a repo
    # secret (Settings -> Secrets and variables -> Actions). Until then this
    # job is skipped and you can `kubectl apply -k k8s/` manually instead.
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"

      - name: Set image and roll out
        run: |
          kubectl set image deployment/leave-mcp-server \
            leave-mcp-server=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n leave-management
          kubectl rollout status deployment/leave-mcp-server -n leave-management --timeout=120s

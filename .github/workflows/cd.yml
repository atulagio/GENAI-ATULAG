name: CD

# Runs after CI succeeds on main.
# 1. Builds and pushes the image to Amazon ECR.
# 2. Rolls the new image out to an AWS EKS cluster.
#
# Repo is a monorepo — this project lives in LEAVE-MANAGEMENT-PG-MCP/, not
# at the repo root — so every `run:` step executes inside that folder via
# `defaults.run.working-directory`, and steps that don't respect that
# (docker/build-push-action) get an explicit path instead.
#
# Database is Neon (managed Postgres) — there's no in-cluster Postgres to
# stand up, so this workflow only applies the app-facing manifests, not
# k8s/postgres.yaml.
#
# ECR (not GHCR) is used because your EKS worker nodes can pull from ECR
# directly via their node IAM role — no imagePullSecrets needed at all,
# unlike a private GHCR package.
on:
  push:
    branches: ["master"]
    paths:
      - "LEAVE-MANAGEMENT-PG-MCP/**"
      - ".github/workflows/cd.yml"
  workflow_dispatch: {}  # lets you trigger a run manually from the Actions tab,
                          # useful when you just want to confirm a workflow-file
                          # fix without touching app code

env:
  ECR_REPOSITORY: leave-management-mcp
  PROJECT_DIR: LEAVE-MANAGEMENT-PG-MCP
  NAMESPACE: leave-management

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_uri: ${{ steps.image.outputs.uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" \
            || aws ecr create-repository --repository-name "$ECR_REPOSITORY"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image URI
        id: image
        run: |
          echo "uri=${{ steps.ecr-login.outputs.registry }}/${ECR_REPOSITORY}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ github.workspace }}/${{ env.PROJECT_DIR }}
          push: true
          tags: |
            ${{ steps.image.outputs.uri }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    defaults:
      run:
        working-directory: ${{ github.workspace }}/LEAVE-MANAGEMENT-PG-MCP
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # NOTE: these two are read from `secrets`, not `vars`, because
          # that's the tab they were added to in GitHub. Functionally
          # identical either way — just has to match where you put them.
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Point kubectl at the EKS cluster
        run: |
          aws eks update-kubeconfig \
            --name "${{ secrets.EKS_CLUSTER_NAME }}" \
            --region "${{ secrets.AWS_REGION }}"

      - name: Ensure namespace exists
        run: kubectl apply -f k8s/namespace.yaml

      - name: Create/update leave-mcp-secrets from GitHub secrets
        # DATABASE_URL should be your Neon connection string, e.g.
        # postgresql://user:password@ep-xxxx.region.aws.neon.tech/leave_management?sslmode=require
        run: |
          kubectl create secret generic leave-mcp-secrets \
            --namespace "${NAMESPACE}" \
            --from-literal=DATABASE_URL='${{ secrets.DATABASE_URL }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply manifests (app only — Neon replaces in-cluster postgres.yaml)
        run: |
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Set image and roll out
        run: |
          kubectl set image deployment/leave-mcp-server \
            leave-mcp-server=${{ needs.build-and-push.outputs.image_uri }} \
            -n leave-management
          kubectl rollout status deployment/leave-mcp-server -n leave-management --timeout=180s
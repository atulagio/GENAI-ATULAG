name: CD

# Runs after CI succeeds on master.
# 1. Builds and pushes the image to GitHub Container Registry (GHCR).
# 2. Rolls the new image out to an AWS EKS cluster.
#
# Repo is a monorepo — this project lives in LEAVE-MANAGEMENT-PG-MCP/, not
# at the repo root — so every `run:` step executes inside that folder via
# `defaults.run.working-directory`, and steps that don't respect that
# (docker/build-push-action) get an explicit path instead.
#
# Database is Neon (managed Postgres) — there's no in-cluster Postgres to
# stand up, so this workflow only applies the app-facing manifests, not
# k8s/postgres.yaml.
on:
  push:
    branches: ["master"]
    paths: ["LEAVE-MANAGEMENT-PG-MCP/**"]

env:
  # REGISTRY: ghcr.io
  # IMAGE_NAME: ${{ github.repository }}   # e.g. ghcr.io/your-org/your-monorepo
  # PROJECT_DIR: LEAVE-MANAGEMENT-PG-MCP
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: leave-mcp-server   # Your ECR repository name
  PROJECT_DIR: LEAVE-MANAGEMENT-PG-MCP

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories \
            --repository-names ${{ env.ECR_REPOSITORY }} \
            --region ${{ env.AWS_REGION }} \
          || aws ecr create-repository \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --region ${{ env.AWS_REGION }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ github.workspace }}/${{ env.PROJECT_DIR }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    defaults:
      run:
        working-directory: ${{ github.workspace }}/LEAVE-MANAGEMENT-PG-MCP
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Setup kubectl
      uses: azure/setup-kubectl@v4

    - name: Configure kubeconfig
      run: |
        aws eks update-kubeconfig \
          --name "${{ secrets.EKS_CLUSTER_NAME }}" \
          --region "${{ secrets.AWS_REGION }}"

    - name: Resolve image tag
      id: image
      env:
        INPUT_TAG: ${{ inputs.image_tag }}
      run: |
        set -euo pipefail

        if [ -z "${INPUT_TAG}" ] || [ "${INPUT_TAG}" = "sha" ]; then
          echo "tag=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
        else
          echo "tag=${INPUT_TAG}" >> "${GITHUB_OUTPUT}"
        fi

    - name: Ensure ECR repositories exist
      run: |
        set -euo pipefail

        aws ecr describe-repositories \
          --repository-names "${ECR_REPOSITORY}" >/dev/null 2>&1 || \
        aws ecr create-repository \
          --repository-name "${ECR_REPOSITORY}" >/dev/null


    - name: Build and push MCP server image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ steps.image.outputs.tag }}
      run: |
        set -euo pipefail

        docker build \
          -t "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" \
          -t "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest" \
          "${PROJECT_DIR}/leave-mcp-server"

        docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
        docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"

    - name: Render Kubernetes manifests
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ steps.image.outputs.tag }}
        INGRESS_HOST: ${{ inputs.ingress_host }}
        RUN_SCHEMA_SETUP: ${{ inputs.run_schema_setup }}
      run: |
        set -euo pipefail

        INGRESS_HOST="${INGRESS_HOST:-leave-mcp.example.com}"
        RUN_SCHEMA_SETUP="${RUN_SCHEMA_SETUP:-false}"

        rm -rf rendered-k8s
        mkdir -p rendered-k8s

        cp "${PROJECT_DIR}/k8s/00-namespace.yaml" rendered-k8s/
        cp "${PROJECT_DIR}/k8s/01-configmap.yaml" rendered-k8s/
        cp "${PROJECT_DIR}/k8s/03-langgraph-agent.yaml" rendered-k8s/
        cp "${PROJECT_DIR}/k8s/04-mcp-server.yaml" rendered-k8s/
        cp "${PROJECT_DIR}/k8s/05-ingress.yaml" rendered-k8s/
        cp "${PROJECT_DIR}/k8s/06-hpa.yaml" rendered-k8s/

        MCP_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

        sed -i "s|111122223333.dkr.ecr.us-east-1.amazonaws.com/leave-mcp-server:latest|${MCP_IMAGE}|g" rendered-k8s/04-mcp-server.yaml
        sed -i "s|leave-mcp.example.com|${INGRESS_HOST}|g" rendered-k8s/05-ingress.yaml
        sed -i "s|LANGGRAPH_POSTGRES_SETUP: \"true\"|LANGGRAPH_POSTGRES_SETUP: \"${RUN_SCHEMA_SETUP}\"|g" rendered-k8s/01-configmap.yaml
        sed -i "s|LANGGRAPH_POSTGRES_SETUP: \"false\"|LANGGRAPH_POSTGRES_SETUP: \"${RUN_SCHEMA_SETUP}\"|g" rendered-k8s/01-configmap.yaml
        sed -i "s|BOOKINGS_TABLE_SETUP: \"true\"|BOOKINGS_TABLE_SETUP: \"${RUN_SCHEMA_SETUP}\"|g" rendered-k8s/01-configmap.yaml
        sed -i "s|BOOKINGS_TABLE_SETUP: \"false\"|BOOKINGS_TABLE_SETUP: \"${RUN_SCHEMA_SETUP}\"|g" rendered-k8s/01-configmap.yaml

        if [ "${RUN_SCHEMA_SETUP}" = "true" ]; then
          python - <<'PY'
        from pathlib import Path

        path = Path("rendered-k8s/03-langgraph-agent.yaml")
        text = path.read_text()
        text = text.replace("replicas: 2", "replicas: 1", 1)
        path.write_text(text)
        PY
        fi

    - name: Apply namespace
      run: kubectl apply -f rendered-k8s/00-namespace.yaml

    - name: Apply runtime secret
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        LANGGRAPH_POSTGRES_URI: ${{ secrets.LANGGRAPH_POSTGRES_URI }}
      run: |
        set -euo pipefail

        kubectl create secret generic leave-mcp-secrets \
          --namespace "${NAMESPACE}" \
          --from-literal=OPENAI_API_KEY="${OPENAI_API_KEY}" \
          --from-literal=LANGGRAPH_POSTGRES_URI="${LANGGRAPH_POSTGRES_URI}" \
          --dry-run=client \
          -o yaml | kubectl apply -f -

    - name: Apply manifests
      run: |
        kubectl apply -f rendered-k8s/01-configmap.yaml
        kubectl apply -f rendered-k8s/03-langgraph-agent.yaml
        kubectl apply -f rendered-k8s/04-mcp-server.yaml
        kubectl apply -f rendered-k8s/05-ingress.yaml
        kubectl apply -f rendered-k8s/06-hpa.yaml

    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/leave-mcp-server -n "${NAMESPACE}" --timeout=300s

    - name: Show deployment summary
      if: always()
      run: |
        kubectl get pods -n "${NAMESPACE}" -o wide
        kubectl get svc -n "${NAMESPACE}"
        kubectl get ingress -n "${NAMESPACE}"

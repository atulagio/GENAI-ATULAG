apiVersion: v1
kind: ConfigMap
metadata:
  name: leave-mcp-config
  namespace: leave-management
data:
  MCP_TRANSPORT: "streamable-http"
  MCP_HOST: "0.0.0.0"
  MCP_PORT: "8000"
  # No POSTGRES_HOST/PORT/DB/USER here — the app only reads DATABASE_URL
  # (from the leave-mcp-secrets Secret), which for Neon is a full
  # connection string including host, so these would be unused/stale.
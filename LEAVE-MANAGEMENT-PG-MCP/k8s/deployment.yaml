apiVersion: apps/v1
kind: Deployment
metadata:
  name: leave-mcp-server
  namespace: leave-management
  labels:
    app: leave-mcp-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: leave-mcp-server
  template:
    metadata:
      labels:
        app: leave-mcp-server
    spec:
      # Only needed if your GHCR package is private — EKS nodes have no
      # credentials to pull from ghcr.io by default. Either make the
      # package public (repo -> Packages -> Package settings -> Change
      # visibility), or uncomment this after creating the pull secret:
      #
      #   kubectl create secret docker-registry ghcr-pull-secret \
      #     --namespace leave-management \
      #     --docker-server=ghcr.io \
      #     --docker-username=<your-github-username> \
      #     --docker-password=<a GitHub PAT with read:packages scope>
      #
      # imagePullSecrets:
      #   - name: ghcr-pull-secret
      # Wait for the database (Neon, or whatever DATABASE_URL points to) to
      # accept connections before starting the app, so a slow/cold-starting
      # DB doesn't cause a crash-loop. pg_isready understands a full
      # connection-string URI, including Neon's ?sslmode=require suffix.
      initContainers:
        - name: wait-for-postgres
          image: postgres:16
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: leave-mcp-secrets
                  key: DATABASE_URL
          command:
            - sh
            - -c
            - |
              until pg_isready -d "$DATABASE_URL"; do
                echo "waiting for postgres..."
                sleep 2
              done
      containers:
        - name: leave-mcp-server
          # Replace with your GHCR image; CD workflow pushes
          # ghcr.io/<owner>/<repo>:<sha|latest|vX.Y.Z>
          image: ghcr.io/OWNER/REPO:latest
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: leave-mcp-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: leave-mcp-secrets
                  key: DATABASE_URL
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
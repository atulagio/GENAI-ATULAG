apiVersion: apps/v1
kind: Deployment
metadata:
  name: leave-mcp-server
  namespace: leave-management
  labels:
    app: leave-mcp-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: leave-mcp-server
  template:
    metadata:
      labels:
        app: leave-mcp-server
    spec:
      # Wait for postgres to accept connections before starting the app,
      # so a slow DB on first boot doesn't cause a crash-loop.
      initContainers:
        - name: wait-for-postgres
          image: postgres:16
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: leave-mcp-secrets
                  key: DATABASE_URL
          command:
            - sh
            - -c
            - |
              until pg_isready -d "$DATABASE_URL"; do
                echo "waiting for postgres..."
                sleep 2
              done
      containers:
        - name: leave-mcp-server
          # Replace with your GHCR image; CD workflow pushes
          # ghcr.io/<owner>/<repo>:<sha|latest|vX.Y.Z>
          image: ghcr.io/OWNER/REPO:latest
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: leave-mcp-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: leave-mcp-secrets
                  key: DATABASE_URL
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true

apiVersion: apps/v1
kind: Deployment
metadata:
  name: leave-mcp-server
  namespace: leave-management
  labels:
    app: leave-mcp-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: leave-mcp-server
  template:
    metadata:
      labels:
        app: leave-mcp-server
    spec:
      # No imagePullSecrets needed here: EKS worker nodes can pull from
      # ECR directly via their node IAM role (AmazonEC2ContainerRegistryReadOnly
      # is included in the standard EKS node IAM policy). If your node role
      # was customized to remove that, re-add it — that's the only
      # requirement for image pulls to work.
      #
      # Wait for the database (Neon, or whatever DATABASE_URL points to) to
      # accept connections before starting the app, so a slow/cold-starting
      # DB doesn't cause a crash-loop. pg_isready understands a full
      # connection-string URI, including Neon's ?sslmode=require suffix.
      initContainers:
        - name: wait-for-postgres
          image: postgres:16
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: leave-mcp-secrets
                  key: DATABASE_URL
          command:
            - sh
            - -c
            - |
              until pg_isready -d "$DATABASE_URL"; do
                echo "waiting for postgres..."
                sleep 2
              done
      containers:
        - name: leave-mcp-server
          # Replaced automatically by `kubectl set image` in cd.yml on every
          # deploy. This placeholder is only used the very first time you
          # apply the manifest by hand — swap in your real ECR URI, e.g.
          # 123456789012.dkr.ecr.ap-south-1.amazonaws.com/leave-management-mcp:latest
          image: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/leave-management-mcp:latest
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: leave-mcp-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: leave-mcp-secrets
                  key: DATABASE_URL
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
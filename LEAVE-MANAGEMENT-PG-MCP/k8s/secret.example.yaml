# EXAMPLE ONLY — do not commit real credentials to git.
#
# Recommended: generate this directly on the cluster instead of committing
# a filled-in copy:
#
#   kubectl create secret generic leave-mcp-secrets \
#     --namespace leave-management \
#     --from-literal=POSTGRES_PASSWORD='replace-with-a-strong-password' \
#     --from-literal=DATABASE_URL='postgresql://leave_user:replace-with-a-strong-password@postgres.leave-management.svc.cluster.local:5432/leave_management'
#
# For real production use, prefer a secrets manager instead of plain
# Kubernetes Secrets (which are only base64-encoded, not encrypted, unless
# you've enabled encryption-at-rest): e.g. External Secrets Operator,
# Sealed Secrets, or your cloud provider's secret store.
apiVersion: v1
kind: Secret
metadata:
  name: leave-mcp-secrets
  namespace: leave-management
type: Opaque
stringData:
  POSTGRES_PASSWORD: "REPLACE_ME"
  DATABASE_URL: "postgresql://leave_user:REPLACE_ME@postgres.leave-management.svc.cluster.local:5432/leave_management"

# EXAMPLE ONLY — do not commit real credentials to git.
#
# Database is Neon (managed Postgres) — copy the connection string from
# your Neon project dashboard. It looks like:
#   postgresql://<user>:<password>@ep-xxxx-xxxx.<region>.aws.neon.tech/leave_management?sslmode=require
#
# Recommended: generate this directly on the cluster instead of committing
# a filled-in copy (the CD workflow does this automatically on every
# deploy from the DATABASE_URL GitHub secret, but you can also do it
# manually the first time):
#
#   kubectl create secret generic leave-mcp-secrets \
#     --namespace leave-management \
#     --from-literal=DATABASE_URL='postgresql://user:password@ep-xxxx.region.aws.neon.tech/leave_management?sslmode=require'
#
# For real production use, prefer a secrets manager instead of plain
# Kubernetes Secrets (which are only base64-encoded, not encrypted, unless
# you've enabled encryption-at-rest): e.g. External Secrets Operator,
# Sealed Secrets, or your cloud provider's secret store.
apiVersion: v1
kind: Secret
metadata:
  name: leave-mcp-secrets
  namespace: leave-management
type: Opaque
stringData:
  DATABASE_URL: "postgresql://REPLACE_ME:REPLACE_ME@REPLACE_ME.neon.tech/leave_management?sslmode=require"
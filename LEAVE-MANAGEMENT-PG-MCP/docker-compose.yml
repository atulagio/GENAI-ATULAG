version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: leave_mcp_postgres
    environment:
      POSTGRES_USER: leave_user
      POSTGRES_PASSWORD: leave_pass
      POSTGRES_DB: leave_management
    ports:
      - "5432:5432"
    volumes:
      - leave_mcp_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leave_user -d leave_management"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: leave_mcp_server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://leave_user:leave_pass@postgres:5432/leave_management
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
    ports:
      - "8000:8000"

volumes:
  leave_mcp_data:
